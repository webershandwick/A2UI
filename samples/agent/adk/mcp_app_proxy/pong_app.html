<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pong - A2UI Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --bg: #0a0b1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: stretch;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1b3a 0%, #0a0b1e 100%);
        }

        .container {
            position: relative;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: stretch;
            flex: 1;
            min-height: 0;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            position: relative;
        }

        .mcp-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: rgba(255, 0, 255, 0.15);
            color: #ff88ff;
            border: 1px solid rgba(255, 0, 255, 0.4);
            font-size: 0.65rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            white-space: nowrap;
            margin-bottom: 0.5rem;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            background: #000;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            cursor: none;
            width: 100%;
            height: 100%;
            display: block;
            box-sizing: border-box;
        }

        .controls {
            font-size: 0.9rem;
            opacity: 0.7;
            display: flex;
            gap: 1rem;
        }

        .key {
            padding: 0.2rem 0.5rem;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace;
        }

        /* Overlay for start/pause */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 11, 30, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), #00d2ff);
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 255, 0.6);
            filter: brightness(1.1);
        }

        .hidden {
            display: none !important;
        }

        .pause-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            z-index: 20;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
        }

        .blob-1 { top: -100px; left: -100px; background: var(--primary); }
        .blob-2 { bottom: -100px; right: -100px; background: var(--secondary); }
    </style>
    <script>
        /**
         * MCP Communication Layer
         * Handles bidirectional JSON-RPC communication using the Model Context Protocol (MCP)
         * over the Window.postMessage API. This allows the embedded app to send requests 
         * (like tool calls) to the parent proxy agent and handle framework-level initialization 
         * and state updates.
         */
        let nextId = 1;

        function sendRequest(method, params) {
            const id = nextId++;
            window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, '*');
            return new Promise((resolve, reject) => {
                const listener = (event) => {
                    if (event.data?.id === id) {
                        window.removeEventListener('message', listener);
                        if (event.data?.result) {
                            resolve(event.data.result);
                        } else if (event.data?.error) {
                            reject(new Error(event.data.error.message || JSON.stringify(event.data.error)));
                        }
                    }
                };
                window.addEventListener('message', listener);
            });
        }

        function sendNotification(method, params) {
            window.parent.postMessage({ jsonrpc: "2.0", method, params }, '*');
        }

        window.addEventListener('message', (event) => {
            const data = event.data;
            if (data?.method === 'ping') {
                if (data.id) {
                    window.parent.postMessage({ jsonrpc: "2.0", id: data.id, result: {} }, '*');
                }
            } else if (data === 'unpause' || data?.type === 'unpause') {
                if (typeof unpauseGame === 'function') {
                    unpauseGame();
                } else {
                    console.warn("unpauseGame is not defined yet");
                }
            }
        });

        // Initialize
        sendRequest("ui/initialize", {
            appCapabilities: {
                experimental: {},
                tools: { listChanged: false },
                availableDisplayModes: ["inline"]
            }
        }).then((result) => {
            console.log("Initialized with host:", result);
            sendNotification("ui/notifications/initialized", {});
        }).catch(err => {
            console.error("Initialization failed:", err);
        });
    </script>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container" id="container">
        <div class="header">
            <div class="mcp-badge">🔌 Embedded MCP App</div>
        </div>

        <div style="position: relative; width: 100%; display: flex; justify-content: center; flex: 1; min-height: 0;">
            <canvas id="pong"></canvas>
            <div id="game-overlay">
                <h2 id="overlay-text" style="font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 2rem;">NEON PONG</h2>
                <button id="start-btn" class="btn" onclick="startGame()">Start Game</button>
            </div>
            <button id="pause-btn" class="pause-btn hidden" onclick="togglePause()">Pause</button>
        </div>

        <div class="controls">
            <span>Move: <span class="key">W</span> / <span class="key">S</span> or <span class="key">Mouse</span></span>
        </div>
    </div>

    <script>
        /**
         * Game Engine & Rendering Logic
         * Manages game state (ball, paddles), user inputs, physics (collision, movement velocity), 
         * and the canvas rendering loop. This script encapsulates the core Pong mechanics and interfaces
         * with the MCP layer to synchronize critical game state like scores with the backend agent.
         */
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const container = document.getElementById('container');

        function displayOverlay(text = "", buttonText = null) {
            const overlayEl = document.getElementById('game-overlay');
            const overlayText = document.getElementById('overlay-text');
            const startBtn = document.getElementById('start-btn');

            overlayEl.classList.remove('hidden');
            if (text) overlayText.textContent = text;
            
            if (buttonText) {
                startBtn.textContent = buttonText;
                startBtn.classList.remove('hidden');
            } else {
                startBtn.classList.add('hidden');
            }
        }

        function hideOverlay() {
            const overlayEl = document.getElementById('game-overlay');
            overlayEl.classList.add('hidden');
        }

        // Reference dimensions for scaling
        const REF_WIDTH = 600;
        const REF_HEIGHT = 400;
        let scale = 1;

        const ball = {
            x: 0,
            y: 0,
            radius: 8,
            speed: 5,
            velocityX: 5,
            velocityY: 5,
            color: "#00f2ff"
        };

        const user = {
            x: 0,
            y: 0,
            width: 10,
            height: 100,
            color: "#00f2ff"
        };

        const cpu = {
            x: 0,
            y: 0,
            width: 10,
            height: 100,
            color: "#ff00ff"
        };

        const net = {
            x: 0,
            y: 0,
            width: 2,
            height: 10,
            color: "rgba(255, 255, 255, 0.1)"
        };

        let isRunning = false;
        let isPaused = false;

        function resize() {
            // Update canvas resolution to match display size
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            // Calculate scale factor relative to reference 600x400
            scale = canvas.width / REF_WIDTH;

            // Update object dimensions
            ball.radius = 8 * scale;
            user.width = 10 * scale;
            user.height = 100 * scale;
            cpu.width = 10 * scale;
            cpu.height = 100 * scale;
            cpu.x = canvas.width - cpu.width;
            
            net.width = 2 * scale;
            net.height = 10 * scale;
            net.x = canvas.width / 2 - net.width / 2;

            // Reset positions if game hasn't started
            if (!isRunning) {
                user.y = canvas.height / 2 - user.height / 2;
                cpu.y = canvas.height / 2 - cpu.height / 2;
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
            }
        }

        const resizeObserver = new ResizeObserver(() => resize());
        resizeObserver.observe(canvas);

        function drawRect(x, y, w, h, color, glow = false) {
            context.fillStyle = color;
            if (glow) {
                context.shadowBlur = 15 * scale;
                context.shadowColor = color;
            } else {
                context.shadowBlur = 0;
            }
            context.fillRect(x, y, w, h);
            context.shadowBlur = 0;
        }

        function drawCircle(x, y, r, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, r, 0, Math.PI * 2, false);
            context.closePath();
            context.shadowBlur = 15 * scale;
            context.shadowColor = color;
            context.fill();
            context.shadowBlur = 0;
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15 * scale) {
                drawRect(net.x, net.y + i, net.width, net.height, net.color);
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 5 * scale;
            // Maintain direction but scale magnitude
            const dirX = ball.velocityX > 0 ? 1 : -1;
            const dirY = ball.velocityY > 0 ? 1 : -1;
            ball.velocityX = -dirX * ball.speed;
            ball.velocityY = dirY * ball.speed * (Math.random() * 2 - 1);
        }

        function collision(b, p) {
            return b.x + b.radius > p.x && 
                   b.x - b.radius < p.x + p.width && 
                   b.y + b.radius > p.y && 
                   b.y - b.radius < p.y + p.height;
        }

        function update() {
            if (!isRunning || isPaused) return;

            // CPU AI
            let targetY = ball.y - cpu.height / 2;
            cpu.y += (targetY - cpu.y) * 0.1;

            // Ball movement
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Wall collision
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Paddle collision
            let player = (ball.x < canvas.width / 2) ? user : cpu;

            if (collision(ball, player)) {
                let collidePoint = ball.y - (player.y + player.height / 2);
                collidePoint = collidePoint / (player.height / 2);

                let angleRad = collidePoint * (Math.PI / 4);
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                ball.speed += 0.2 * scale;
            }

            // Check if there is a winner, and update the score via MCP tool call.
            let winner = null;
            if (ball.x - ball.radius < 0) {
                winner = 'cpu';
            } else if (ball.x + ball.radius > canvas.width) {
                winner = 'player';
            }
            
            if (winner) {
                syncScore(winner);
                resetBall();
            }
        }

        function syncScore(player) {
            isPaused = true; // Local pause
            displayOverlay("SYNCING SCORE...");
            
            sendRequest('tools/call', {
                name: 'score_update',
                arguments: { player: player, silent: true }
            }).catch(e => console.error("Failed to send score update:", e)).finally(() => unpauseGame());
        }

        function unpauseGame() {
            isPaused = false;
            hideOverlay();
            if (isRunning) {
                document.getElementById('pause-btn').textContent = "Pause";
            }
        }



        function render() {
            drawRect(0, 0, canvas.width, canvas.height, "#000");
            drawNet();
            drawRect(user.x, user.y, user.width, user.height, user.color, true);
            drawRect(cpu.x, cpu.y, cpu.width, cpu.height, cpu.color, true);
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        function game() {
            update();
            render();
        }

        canvas.addEventListener('mousemove', (evt) => {
            let rect = canvas.getBoundingClientRect();
            let mouseY = evt.clientY - rect.top - user.height / 2;
            if (mouseY >= 0 && mouseY <= canvas.height - user.height) {
                user.y = mouseY;
            }
        });

        window.addEventListener('keydown', (evt) => {
            if (evt.key === 'w' || evt.key === 'W') {
                user.y -= 20 * scale;
            } else if (evt.key === 's' || evt.key === 'S') {
                user.y += 20 * scale;
            } else if (evt.key === 'p' || evt.key === 'P' || evt.key === 'Escape') {
                togglePause();
            } else if (evt.key === ' ' && !isRunning) {
                startGame();
            } else if (evt.key === ' ' && isRunning) {
                togglePause();
            }
            if (user.y < 0) user.y = 0;
            if (user.y > canvas.height - user.height) user.y = canvas.height - user.height;
        });

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pause-btn');

            if (isPaused) {
                displayOverlay("PAUSED", "Resume");
                pauseBtn.textContent = "Resume";
            } else {
                hideOverlay();
                pauseBtn.textContent = "Pause";
            }
        }

        function startGame() {
            if (isPaused) {
                togglePause();
                return;
            }
            hideOverlay();
            document.getElementById('pause-btn').classList.remove('hidden');
            isRunning = true;
            isPaused = false;
            resetBall();
        }

        // Initialize
        resize();
        const framePerSecond = 50;
        setInterval(game, 1000 / framePerSecond);
        render();
    </script>
</body>
</html>
