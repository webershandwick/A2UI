<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Calculator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }
  .calculator {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 300px;
  }
  .display {
    width: 100%;
    height: 60px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 2em;
    text-align: right;
    padding: 10px;
    box-sizing: border-box;
    overflow-x: auto;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    padding: 15px;
    font-size: 1.2em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #e0e0e0;
    transition: background-color 0.2s;
  }
  button:hover {
    background-color: #d0d0d0;
  }
  button.operator {
    background-color: #ff9f0a;
    color: white;
  }
  button.operator:hover {
    background-color: #e08900;
  }
  button.equals {
    background-color: #34c759;
    color: white;
  }
  button.equals:hover {
    background-color: #2da84e;
  }
  button.mcp-equals {
    background-color: #5856d6;
    color: white;
  }
  button.mcp-equals:hover {
    background-color: #4342a1;
  }
  button.clear {
    background-color: #ff3b30;
    color: white;
    grid-column: span 2;
  }
  button.clear:hover {
    background-color: #d6332a;
  }
  button.zero {
    grid-column: span 2;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">AC</button>
    <button class="operator" onclick="appendOperator('/')">÷</button>
    <button class="operator" onclick="appendOperator('*')">×</button>
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator" onclick="appendOperator('-')">-</button>
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="operator" onclick="appendOperator('+')">+</button>
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="equals" title="Local JavaScript Calculation" onclick="calculateJavascript()">💻 =</button>
    <button class="zero" onclick="appendNumber('0')">0</button>
    <button onclick="appendPoint()">.</button>
    <button class="mcp-equals" title="MCP Agent Calculation" onclick="calculateToolCall()">🤖 =</button>
  </div>
</div>

<script>
  let currentInput = '';
  let previousInput = '';
  let operator = null;
  const displayElement = document.getElementById('display');

  function updateDisplay() {
    displayElement.textContent = currentInput || '0';
  }

  function appendNumber(number) {
    if (currentInput === '0' && number !== '.') {
      currentInput = number;
    } else {
      currentInput += number;
    }
    updateDisplay();
  }

  function appendPoint() {
    if (!currentInput.includes('.')) {
      currentInput += '.';
      updateDisplay();
    }
  }

  function appendOperator(op) {
    if (currentInput === '') return;
    if (previousInput !== '') {
      calculateJavascript();
    }
    operator = op;
    previousInput = currentInput;
    currentInput = '';
  }

  function clearDisplay() {
    currentInput = '';
    previousInput = '';
    operator = null;
    updateDisplay();
  }

  function calculateJavascript() {
    if (previousInput === '' || currentInput === '') return;
    let result;
    const prevVal = parseFloat(previousInput);
    const currentVal = parseFloat(currentInput);
    if (isNaN(prevVal) || isNaN(currentVal)) return;

    switch (operator) {
      case '+':
        result = prevVal + currentVal;
        break;
      case '-':
        result = prevVal - currentVal;
        break;
      case '*':
        result = prevVal * currentVal;
        break;
      case '/':
        if (currentVal === 0) {
          currentInput = 'Error';
          operator = null;
          previousInput = '';
          updateDisplay();
          return;
        }
        result = prevVal / currentVal;
        break;
      default:
        return;
    }
    currentInput = result.toString();
    updateDisplay();
    
    // Log calculation to host
    sendNotification('notifications/message', {
      level: 'info',
      data: `Calculated: ${prevVal} ${operator} ${currentVal} = ${result}`
    });

    operator = null;
    previousInput = '';
  }

  function calculateToolCall() {
    if (previousInput === '' || currentInput === '') return;
    const prevVal = parseFloat(previousInput);
    const currentVal = parseFloat(currentInput);
    if (isNaN(prevVal) || isNaN(currentVal)) return;

    let opName = '';
    switch (operator) {
      case '+': opName = 'add'; break;
      case '-': opName = 'subtract'; break;
      case '*': opName = 'multiply'; break;
      case '/': opName = 'divide'; break;
      default: return;
    }

    sendRequest('tools/call', {
      name: 'calculate',
      arguments: {
        operation: opName,
        a: prevVal,
        b: currentVal
      }
    }).then(result => {
       console.log("Tool call result:", result);
    }).catch(err => {
       console.error("Tool call failed:", err);
    });

    // Reset state locally as per user requirement (UI can forget about it)
    currentInput = '';
    previousInput = '';
    operator = null;
    updateDisplay();
  }

  // MCP Communication
  let nextId = 1;
  const PARENT_ORIGIN = 'http://localhost:4200';

  function sendRequest(method, params) {
    const id = nextId++;
    window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, PARENT_ORIGIN);
    return new Promise((resolve, reject) => {
      const listener = (event) => {
        if (event.origin !== PARENT_ORIGIN) {
          console.warn('Message from untrusted origin ignored:', event.origin);
          return;
        }
        if (event.data?.id === id) {
          window.removeEventListener('message', listener);
          if (event.data?.result) {
            resolve(event.data.result);
          } else if (event.data?.error) {
            reject(new Error(event.data.error.message || JSON.stringify(event.data.error)));
          }
        }
      };
      window.addEventListener('message', listener);
    });
  }

  function sendNotification(method, params) {
    window.parent.postMessage({ jsonrpc: "2.0", method, params }, PARENT_ORIGIN);
  }

  window.addEventListener('message', (event) => {
    if (event.origin !== PARENT_ORIGIN) {
      console.warn('Message from untrusted origin ignored:', event.origin);
      return;
    }
    const data = event.data;
    if (data?.method === 'ping') {
      // The host sends a 'ping' to check if the app is responsive (liveness check).
      // Since this example does not use an MCP SDK, we must manually reply with an empty result
      // to acknowledge the ping and keep the connection alive.
      if (data.id) {
         window.parent.postMessage({ jsonrpc: "2.0", id: data.id, result: {} }, PARENT_ORIGIN);
      }
    }
  });

  // Initialize
  sendRequest("ui/initialize", {
      appCapabilities: {
          experimental: {},
          tools: { listChanged: false },
          availableDisplayModes: ["inline"]
      }
  }).then((result) => {
      console.log("Initialized with host:", result);
      sendNotification("ui/notifications/initialized", {});
  }).catch(err => {
      console.error("Initialization failed:", err);
  });

</script>
</body>
</html>
