name: Flutter CI, except 'e2e_test'

on:
  workflow_dispatch:
  push:
    branches:
      - main    
  pull_request:
    branches:
      - main
  schedule:
    # Tests may fail due to new dependency releases.
    # Regular execution provides early detection of such regressions.
    - cron: '0 * * * *' # hourly

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate testing matrix
        id: generate_matrix
        run: |
          # Test all packages with a pubspec.yaml, except those named 'e2e_test'.
          DIRS_TO_TEST=$(find samples -name pubspec.yaml -not -path "*/.dart_tool/*" -not -path "*/e2e_test/*" -exec dirname {} \;)

          # Build a JSON array of package objects for the matrix.
          JSON_MATRIX="["
          FIRST=true
          for dir in $DIRS_TO_TEST; do
            if [ "$FIRST" = false ]; then
              JSON_MATRIX="$JSON_MATRIX,"
            fi
            FIRST=false
            # The name for the job (path with '/' -> '_')
            package_name=$(echo "$dir" | tr '/' '_')
            # The actual path to the package
            package_path="$dir"
            JSON_MATRIX="$JSON_MATRIX{\"name\":\"$package_name\",\"path\":\"$package_path\"}"
          done
          JSON_MATRIX="$JSON_MATRIX]"

          echo "matrix=$JSON_MATRIX" >> $GITHUB_OUTPUT

  analyze_and_test:
    needs: matrix
    name: ${{ matrix.package.name }} (${{ matrix.flutter_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.matrix.outputs.matrix) }}
        flutter_version: [beta, stable]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
      # Before bumping, verify the new version is on the flutter org's
      # enterprise actions allowlist, or CI will fail with startup_failure.
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          channel: ${{ matrix.flutter_version }}
          cache: true
      - name: Print Flutter version
        run: flutter --version
      - name: Cache Pub dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - name: Update submodules
        working-directory: ${{ matrix.package.path }}
        run: git submodule update --init --recursive
      - name: Install dependencies
        working-directory: ${{ matrix.package.path }}
        run: dart pub get
      - name: Check formatting
        working-directory: ${{ matrix.package.path }}
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze code
        working-directory: ${{ matrix.package.path }}
        run: flutter analyze --fatal-infos
      - name: Run tests
        working-directory: ${{ matrix.package.path }}
        run: |
          if [ -d "test" ]; then
            flutter test --test-randomize-ordering-seed=random
          else
            echo "No 'test' directory found in ${{ matrix.package.path }}, skipping tests."
          fi

      - name: Check for cycles
        working-directory: ${{ matrix.package.path }}
        run: |
          dart pub global activate layerlens
          layerlens --fail-on-cycles  --except "lib/src/schema" --except "lib/src/core"
