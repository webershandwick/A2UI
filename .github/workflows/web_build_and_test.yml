name: Web core

on:
  push:
    branches: [ main ]
    paths:
      - 'renderers/web_core/**/*'
      - '.github/workflows/web_build_and_test.yml'
  pull_request:
    paths:
      - 'renderers/web_core/**/*'
      - '.github/workflows/web_build_and_test.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install web_core dependencies
        working-directory: ./renderers/web_core
        run: npm i

      - name: Build web_core
        working-directory: ./renderers/web_core
        run: npm run build

      - name: Lint web_core
        working-directory: ./renderers/web_core
        run: npm run lint

      - name: Test web_core
        working-directory: ./renderers/web_core
        run: npm run test
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run publish script integration test
        run: node --test renderers/scripts/publish_npm.test.mjs
