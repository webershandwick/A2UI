name: A2UI-agent C++ SDK

on:
  push:
    branches:
      - '*'
    paths:
      - 'agent_sdks/cpp/**'
      - 'specification/**/json/**'
      - 'agent_sdks/conformance/**'
  pull_request:
    paths:
      - 'agent_sdks/cpp/**'
      - 'specification/**/json/**'
      - 'agent_sdks/conformance/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure CMake
        run: cmake -B build -S .
        working-directory: agent_sdks/cpp

      - name: Build
        run: cmake --build build
        working-directory: agent_sdks/cpp

      - name: Run tests
        run: ./build/a2ui_tests
        working-directory: agent_sdks/cpp
