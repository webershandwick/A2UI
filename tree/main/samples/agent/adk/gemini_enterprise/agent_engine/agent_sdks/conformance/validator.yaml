  catalog:
    version: "0.9"
    common_types_schema: "simplified_common_types_v09.json"
    s2c_schema: "simplified_s2c_v09.json"
    catalog_schema:
      catalogId: standard
      components: {}
  validate:
  - payload:
    - version: v0.9
