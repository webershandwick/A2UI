- name: test_validator_circular_reference_v08
  description: Tests that circular references are detected.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: test_catalog
      components:
        Card:
          type: object
          properties:
            child:
              type: string
  validate:
  - payload:
    - beginRendering:
        root: c1
        surfaceId: s1
    - surfaceUpdate:
        surfaceId: s1
        components:
        - id: c1
          component:
            Card:
              child: c2
        - id: c2
          component:
            Card:
              child: c1
    expect_error: Circular reference detected
- name: test_validator_0_9
