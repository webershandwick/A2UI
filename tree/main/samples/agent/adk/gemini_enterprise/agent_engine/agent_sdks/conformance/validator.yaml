- name: test_custom_catalog_0_8
  description: Tests validation with a custom catalog in v0.8.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: custom
      components:
        Canvas:
          type: object
          properties:
            children:
              type: object
              properties:
                explicitList:
                  type: array
                  items:
                    type: string
              required:
              - explicitList
          required:
          - children
        Chart:
          type: object
          properties:
            type:
              type: string
              enum:
              - doughnut
              - pie
            title:
              type: object
              properties:
                literalString:
                  type: string
                path:
                  type: string
            chartData:
              type: object
              properties:
                literalArray:
                  type: array
                path:
                  type: string
          required:
          - type
          - chartData
        GoogleMap:
          type: object
          properties:
            center:
              type: object
              properties:
                literalObject:
                  type: object
                path:
                  type: string
            zoom:
              type: object
              properties:
                literalNumber:
                  type: number
                path:
                  type: string
          required:
          - center
          - zoom
  validate:
  - payload:
    - surfaceUpdate:
        surfaceId: id1
        components:
        - id: root
          component:
            Canvas:
              children:
                explicitList:
                - c1
                - c2
        - id: c1
          component:
            Canvas:
              children:
                explicitList: []
        - id: c2
          component:
            Chart:
              type: pie
              chartData:
                path: /data
- name: test_custom_catalog_0_9
  description: Tests validation with a custom catalog in v0.9.
  catalog:
    version: "0.9"
    common_types_schema: "simplified_common_types_v09.json"
    s2c_schema: "simplified_s2c_v09.json"
    catalog_schema:
      catalogId: custom
      components:
        Canvas:
          type: object
          allOf:
          - $ref: '#/$defs/ComponentCommon'
          - $ref: '#/$defs/CatalogComponentCommon'
          - type: object
            properties:
              component:
                const: Canvas
              children:
                $ref: '#/$defs/ChildList'
            required:
            - component
            - children
        Chart:
          type: object
          allOf:
          - $ref: '#/$defs/ComponentCommon'
          - $ref: '#/$defs/CatalogComponentCommon'
          - type: object
            properties:
              component:
                const: Chart
              chartType:
                enum:
                - doughnut
                - pie
              title:
                $ref: '#/$defs/DynamicString'
              chartData:
                $ref: '#/$defs/DynamicValue'
            required:
            - component
            - chartType
            - chartData
        GoogleMap:
          type: object
          allOf:
          - $ref: '#/$defs/ComponentCommon'
          - $ref: '#/$defs/CatalogComponentCommon'
          - type: object
            properties:
              component:
                const: GoogleMap
              center:
                $ref: '#/$defs/DynamicValue'
              zoom:
                $ref: '#/$defs/DynamicNumber'
              pins:
                $ref: '#/$defs/DynamicValue'
            required:
            - component
            - center
            - zoom
      $defs:
        ComponentId:
          type: string
        ComponentCommon:
          type: object
          properties:
            id:
              $ref: '#/$defs/ComponentId'
          required:
          - id
        ChildList:
          oneOf:
          - type: array
            items:
              $ref: '#/$defs/ComponentId'
          - type: object
            properties:
              componentId:
                $ref: '#/$defs/ComponentId'
              path:
                type: string
            required:
            - componentId
            - path
            additionalProperties: false
        DynamicString:
          anyOf:
          - type: string
          - type: object
        DynamicValue:
          anyOf:
          - type: object
          - type: array
        DynamicNumber:
          anyOf:
          - type: number
          - type: object
        CatalogComponentCommon:
          type: object
          properties:
            weight:
              type: number
        anyComponent:
          oneOf:
          - $ref: '#/components/Canvas'
          - $ref: '#/components/Chart'
          - $ref: '#/components/GoogleMap'
          discriminator:
            propertyName: component
  validate:
  - payload:
    - version: v0.9
      updateComponents:
        surfaceId: s1
        components:
        - id: root
          component: Canvas
          children:
          - c1
          - c2
        - id: c1
          component: Canvas
          children: []
        - id: c2
          component: Chart
          chartType: doughnut
          chartData:
            path: /data
