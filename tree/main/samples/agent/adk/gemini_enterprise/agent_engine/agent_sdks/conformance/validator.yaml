- name: test_validate_function_call_recursion_v08
  description: Tests that function call recursion limit is exceeded in v0.8.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: standard
      components:
        Button:
          type: object
          properties:
            label:
              type: string
            action:
              type: object
  validate:
  - payload:
    - beginRendering:
        root: root
        surfaceId: test-surface
    - surfaceUpdate:
        surfaceId: test-surface
        components:
        - id: root
          component:
            Button:
              label: btn
              action:
                functionCall:
                  call: f0
                  args:
                    functionCall:
                      call: f1
                      args:
                        functionCall:
                          call: f2
                          args:
                            functionCall:
                              call: f3
                              args:
                                functionCall:
                                  call: f4
                                  args:
                                    functionCall:
                                      call: f5
                                      args: {}
    expect_error: 'Recursion limit exceeded: functionCall depth > 5'
