- name: test_partial_single_child_string
  description: Tests that placeholders are yielded for missing children and resolved when they arrive.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: "test_catalog"
      components:
        Text:
          type: object
          properties:
            text: {type: string}
        Card:
          type: object
          properties:
            child: {type: string, title: "ComponentId"}
        Row:
          type: object
          properties:
            children:
              type: object
              properties:
                explicitList: {type: array}
  process_chunk:
    - input: '<a2ui-json>[{"beginRendering": {"root": "root", "surfaceId": "s1"}},'
      expect: [{a2ui: [{beginRendering: {root: "root", surfaceId: "s1"}}]}]
    - input: '{"surfaceUpdate": {"surfaceId": "s1", "components": [{"id": "root", "component": {"Card": {"child": "c1"}}}, '
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "root"
                    component:
                      Card:
                        child: "loading_c1"
                  - id: "loading_c1"
                    component:
                      Row:
                        children: {explicitList: []}
    - input: '{"id": "c1", "component": {"Text": {"text": "child 1"}}}]}}'
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "c1"
                    component:
                      Text:
                        text: "child 1"
                  - id: "root"
                    component:
                      Card:
                        child: "c1"

- name: test_partial_template_componentId
  description: Tests that placeholders are yielded for missing template components and resolved when they arrive.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: "test_catalog"
      components:
        Text:
          type: object
          properties:
            text: {type: string}
        List:
          type: object
          properties:
            children:
              type: object
              properties:
                template:
                  type: object
                  properties:
                    componentId: {type: string, title: "ComponentId"}
        Row:
          type: object
          properties:
            children:
              type: object
              properties:
                explicitList: {type: array}
  process_chunk:
    - input: '<a2ui-json>[{"beginRendering": {"root": "root", "surfaceId": "s1"}},'
      expect: [{a2ui: [{beginRendering: {root: "root", surfaceId: "s1"}}]}]
    - input: '{"surfaceUpdate": {"surfaceId": "s1", "components": [{"id": "root", "component": {"List": {"children": {"template": {"componentId": "c1"}}}}}, '
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "root"
                    component:
                      List:
                        children: {template: {componentId: "loading_c1"}}
                  - id: "loading_c1"
                    component:
                      Row:
                        children: {explicitList: []}
    - input: '{"id": "c1", "component": {"Text": {"text": "child 1"}}}]}}'
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "c1"
                    component:
                      Text:
                        text: "child 1"
                  - id: "root"
                    component:
                      List:
                        children: {template: {componentId: "c1"}}

- name: test_partial_children_lists
  description: Tests that placeholders are yielded for all missing children in a list and resolved individually.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: "test_catalog"
      components:
        Text:
          type: object
          properties:
            text: {type: string}
        Container:
          type: object
          properties:
            children:
              type: array
              items: {type: string, title: "ComponentId"}
        Row:
          type: object
          properties:
            children:
              type: object
              properties:
                explicitList: {type: array}
  process_chunk:
    - input: '<a2ui-json>[{"beginRendering": {"root": "root", "surfaceId": "s1"}},'
      expect: [{a2ui: [{beginRendering: {root: "root", surfaceId: "s1"}}]}]
    - input: '{"surfaceUpdate": {"surfaceId": "s1", "components": [{"id": "root", "component": {"Container": {"children": ["c1", "c2", "c3"]}}}, '
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "root"
                    component:
                      Container:
                        children: ["loading_c1", "loading_c2", "loading_c3"]
                  - id: "loading_c1"
                    component:
                      Row:
                        children: {explicitList: []}
                  - id: "loading_c2"
                    component:
                      Row:
                        children: {explicitList: []}
                  - id: "loading_c3"
                    component:
                      Row:
                        children: {explicitList: []}
    - input: '{"id": "c1", "component": {"Text": {"text": "child 1"}}}]}}'
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "c1"
                    component:
                      Text:
                        text: "child 1"
                  - id: "root"
                    component:
                      Container:
                        children: ["c1", "loading_c2", "loading_c3"]
                  - id: "loading_c2"
                    component:
                      Row:
                        children: {explicitList: []}
                  - id: "loading_c3"
                    component:
                      Row:
                        children: {explicitList: []}

- name: test_data_model_before_components
  description: Tests that data model updates can be processed before components.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: "test_catalog"
      components:
        Text:
          type: object
          properties:
            text:
              type: object
              properties:
                path: {type: string}
  process_chunk:
    - input: "<a2ui-json>["
      expect: []
    - input: '{"dataModelUpdate": {"surfaceId": "s1", "contents": [{"key": "name", "valueString": "Alice"}]}, '
      expect:
        - a2ui:
            - dataModelUpdate:
                surfaceId: "s1"
                contents: [{key: "name", valueString: "Alice"}]
    - input: '{"beginRendering": {"root": "root", "surfaceId": "s1"}}, '
      expect: [{a2ui: [{beginRendering: {root: "root", surfaceId: "s1"}}]}]
    - input: '{"surfaceUpdate": {"surfaceId": "s1", "components": [{"id": "root", "component": {"Text": {"text": {"path": "/name"}}}}}}]</a2ui-json>'
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
                components:
                  - id: "root"
                    component:
                      Text:
                        text: {path: "/name"}

- name: test_data_model_after_components
  description: Tests that components can be processed before data model updates.
  catalog:
    version: "0.8"
    s2c_schema: "simplified_s2c_v08.json"
    catalog_schema:
      catalogId: "test_catalog"
      components:
        Text:
          type: object
          properties:
            text:
              type: object
              properties:
                path: {type: string}
  process_chunk:
    - input: "<a2ui-json>["
      expect: []
    - input: '{"beginRendering": {"root": "root", "surfaceId": "s1"}}, '
      expect: [{a2ui: [{beginRendering: {root: "root", surfaceId: "s1"}}]}]
    - input: '{"surfaceUpdate": {"surfaceId": "s1", "components": [{"id": "root", "component": {"Text": {"text": {"path": "/name"}}}}}}, '
      expect:
        - a2ui:
            - surfaceUpdate:
                surfaceId: "s1"
