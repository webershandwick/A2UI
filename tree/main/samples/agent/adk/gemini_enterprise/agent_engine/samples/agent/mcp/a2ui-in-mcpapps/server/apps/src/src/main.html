<div class="app-container">
  <div class="header">
    <h2>MCP App (Angular Renderer)</h2>
    <button (click)="fetchCounterA2UI()" [disabled]="isLoading()">Fetch Counter A2UI</button>
    <span class="status-badge" [class.loading]="isLoading()">Status: {{ status() }}</span>
  </div>
  
  <div class="surface-area">
    <div class="surface-label">A2UI Rendering Surface</div>
    @if (surfaces().length === 0) {
      <div class="empty-state">No surface data loaded yet. Click 'Fetch Counter' to fetch.</div>
    }
    @for (entry of surfaces(); track entry[0]) {
      <a2ui-surface [surfaceId]="entry[0]" [surface]="entry[1]" />
    }
  </div>

  @if (rawJson()) {
    <div class="debug-section">
      <h3>Raw A2UI JSON</h3>
      <pre class="json-dump"><code>{{ rawJson() }}</code></pre>
    </div>
  }
</div>
