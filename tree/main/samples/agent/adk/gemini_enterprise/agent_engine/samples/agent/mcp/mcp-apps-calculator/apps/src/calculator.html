<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Calculator</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }
  .calculator {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    width: 300px;
  }
  .display {
    width: 100%;
    height: 60px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 2em;
    text-align: right;
    padding: 10px;
    box-sizing: border-box;
    overflow-x: auto;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  button {
    padding: 15px;
    font-size: 1.2em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #e0e0e0;
    transition: background-color 0.2s;
  }
  button:hover {
    background-color: #d0d0d0;
  }
  button.operator {
    background-color: #ff9f0a;
    color: white;
  }
  button.operator:hover {
    background-color: #e08900;
  }
  button.equals {
    background-color: #34c759;
    color: white;
  }
  button.equals:hover {
    background-color: #2da84e;
  }
  button.mcp-equals {
    background-color: #5856d6;
    color: white;
  }
  button.mcp-equals:hover {
    background-color: #4342a1;
  }
  button.clear {
    background-color: #ff3b30;
    color: white;
    grid-column: span 2;
  }
  button.clear:hover {
    background-color: #d6332a;
  }
  button.zero {
    grid-column: span 2;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display" id="display">0</div>
  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">AC</button>
    <button class="operator" onclick="appendOperator('/')">÷</button>
    <button class="operator" onclick="appendOperator('*')">×</button>
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator" onclick="appendOperator('-')">-</button>
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="operator" onclick="appendOperator('+')">+</button>
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="equals" title="Local JavaScript Calculation" onclick="calculateJavascript()">💻 =</button>
    <button class="zero" onclick="appendNumber('0')">0</button>
    <button onclick="appendPoint()">.</button>
    <button class="mcp-equals" title="MCP Agent Calculation" onclick="calculateToolCall()">🤖 =</button>
  </div>
</div>

<script type="module" src="./calculator.ts"></script>
</body>
</html>
