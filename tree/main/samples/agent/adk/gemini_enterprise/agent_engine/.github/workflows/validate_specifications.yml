name: Validate A2UI specification examples

on:
  push:
    branches: [ main ]
    paths:
      - 'specification/**/json/**'
      - '.github/workflows/validate_specifications.yml'
      - 'specification/scripts/validate.py'
  pull_request:
    paths:
      - 'specification/**/json/**'
      - '.github/workflows/validate_specifications.yml'
      - 'specification/scripts/validate.py'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./specification/v0_9/test
        run: pnpm install

      - name: Run validation script
        run: python3 specification/scripts/validate.py
